<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Voice Memory Assistant — Dev Client</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; }
  h1 { font-size: 20px; }
  button { font-size: 16px; padding: 10px 16px; border-radius: 10px; border: 1px solid #888; cursor: pointer; }
  #connect { background: #2563eb; color: white; border: none; }
  #end { background: #dc2626; color: white; border: none; }
  .row { display: flex; gap: 8px; align-items: center; margin: 12px 0; flex-wrap: wrap; }
  #status { font-weight: 600; }
  .pill { padding: 2px 10px; border-radius: 999px; font-size: 13px; }
  .ok { background: #dcfce7; color: #166534; }
  .warn { background: #fef9c3; color: #854d0e; }
  .err { background: #fee2e2; color: #991b1b; }
  ul#notes { list-style: none; padding: 0; }
  ul#notes li { border: 1px solid #ccc; border-radius: 10px; padding: 8px 12px; margin: 6px 0; display:flex; justify-content:space-between; gap:8px; align-items:center;}
  .nid { font-family: ui-monospace, monospace; font-size: 11px; opacity: .6; }
  input[type=text] { font-size: 15px; padding: 8px; border-radius: 8px; border: 1px solid #888; flex: 1; min-width: 160px; }
  #log { white-space: pre-wrap; font-family: ui-monospace, monospace; font-size: 12px; background: #1118; color: #ddd; padding: 10px; border-radius: 8px; max-height: 180px; overflow:auto; }
</style>
</head>
<body>
  <h1>🎙️ Voice Memory Assistant — Dev Client</h1>
  <div class="row">
    <button id="connect">Start conversation</button>
    <button id="end" disabled>End</button>
    <span id="status" class="pill warn">idle</span>
  </div>

  <h3>Notes (live)</h3>
  <ul id="notes"><li><em>not connected</em></li></ul>

  <div class="row">
    <input id="newnote" type="text" placeholder="Type a note and press Add (tests typed → store)" />
    <button id="add">Add</button>
  </div>

  <h3>Log</h3>
  <div id="log"></div>

  <audio id="agentAudio" autoplay></audio>

<script src="https://cdn.jsdelivr.net/npm/livekit-client@2/dist/livekit-client.umd.min.js"></script>
<script>
  const TOKEN_SERVER = "http://localhost:8080";
  const LK = window.LivekitClient;
  let room = null;

  const $ = (id) => document.getElementById(id);
  const log = (m) => { $("log").textContent += m + "\n"; $("log").scrollTop = 1e9; console.log(m); };
  const setStatus = (txt, cls) => { const s = $("status"); s.textContent = txt; s.className = "pill " + (cls||"warn"); };

  function renderNotes(notes) {
    const ul = $("notes");
    ul.innerHTML = "";
    if (!notes || notes.length === 0) { ul.innerHTML = "<li><em>(no notes yet)</em></li>"; return; }
    for (const n of notes) {
      const li = document.createElement("li");
      const left = document.createElement("span");
      left.textContent = n.text;
      const right = document.createElement("span");
      right.innerHTML = `<span class="nid">${n.id}</span> <button data-del="${n.id}">✕</button>`;
      li.appendChild(left); li.appendChild(right);
      ul.appendChild(li);
    }
    ul.querySelectorAll("button[data-del]").forEach(b =>
      b.onclick = () => publishEdit({ action: "delete", id: b.getAttribute("data-del") }));
  }

  function publishEdit(obj) {
    if (!room) return;
    const bytes = new TextEncoder().encode(JSON.stringify(obj));
    room.localParticipant.publishData(bytes, { reliable: true, topic: "notes-edit" });
    log("→ sent notes-edit: " + JSON.stringify(obj));
  }

  $("add").onclick = () => {
    const t = $("newnote").value.trim();
    if (!t) return;
    publishEdit({ action: "create", text: t });
    $("newnote").value = "";
  };

  $("connect").onclick = async () => {
    try {
      setStatus("connecting…", "warn");
      log("fetching token…");
      const res = await fetch(TOKEN_SERVER + "/token", { method: "POST", headers: {"Content-Type":"application/json"}, body: "{}" });
      const { token, url, room: roomName } = await res.json();
      log("token ok, room=" + roomName + " url=" + url);

      room = new LK.Room({ adaptiveStream: true, dynacast: true });

      room.on(LK.RoomEvent.DataReceived, (payload, participant, kind, topic) => {
        if (topic !== "notes") return;
        try {
          const msg = JSON.parse(new TextDecoder().decode(payload));
          if (msg.type === "notes") { renderNotes(msg.notes); log("← notes update (" + msg.notes.length + ")"); }
        } catch (e) { log("bad notes payload: " + e); }
      });

      room.on(LK.RoomEvent.TrackSubscribed, (track) => {
        if (track.kind === "audio") { track.attach($("agentAudio")); log("agent audio attached"); }
      });

      room.on(LK.RoomEvent.Disconnected, () => { setStatus("disconnected", "err"); });

      await room.connect(url, token);
      log("connected to room");
      await room.localParticipant.setMicrophoneEnabled(true);
      log("microphone published");
      setStatus("listening", "ok");
      $("connect").disabled = true; $("end").disabled = false;
    } catch (e) {
      setStatus("error", "err");
      log("ERROR: " + (e && e.message ? e.message : e));
    }
  };

  $("end").onclick = async () => {
    if (room) await room.disconnect();
    setStatus("idle", "warn");
    $("connect").disabled = false; $("end").disabled = true;
    renderNotes([]);
  };
</script>
</body>
</html>
