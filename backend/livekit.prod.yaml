# Production LiveKit config for the single GCE VM (committed — holds NO secrets).
#
# API key/secret are injected at runtime via the LIVEKIT_KEYS env var (see
# docker-compose.prod.yml), sourced from backend/.env. That's why — unlike the
# local dev livekit.yaml — there is no `keys:` block here to leak.
port: 7880
rtc:
  tcp_port: 7881
  # Single multiplexed UDP port for WebRTC media. Must be open on the VM
  # firewall as 7882/udp and published by Docker.
  udp_port: 7882
  # Auto-detect and advertise the VM's PUBLIC IP so clients on the open
  # internet (a phone on cellular, not LAN) can reach media. On GCE this
  # resolves via the metadata server / STUN.
  use_external_ip: true
  # If auto-detection ever picks the wrong address, hardcode it instead:
  #   use_external_ip: false
  #   node_ip: <VM_PUBLIC_IP>
logging:
  level: info
